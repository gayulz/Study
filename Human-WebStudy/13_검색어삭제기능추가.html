<body>
    <h1> 검색어 남기기</h1>
    <hr>
    <span>검색어</span>
    <input type="text" id="Text">
    <button onclick="f_AppendText()">검색</button>

    <hr>
    <h1>검색어 목록</h1>
    <div>

    </div>
    <button id="del" onclick="alldel()">선택삭제</button>
</body>

</html>
<script>
    function f_AppendText() {
        // 값 찾아오기 
        let a = document.querySelector('input').value  // input 태그의 값
        // 넣을 위치의 div 값
        let getDiv = document.querySelector('div')  // 목록 밑 div 태그로 추가로 생성할꺼임
        //생성할 태그
        let span = document.createElement('p')
        //div의 자식으로 넣기
        getDiv.append(span)
        //생성할 태그의 텍스트값
        span.innerHTML = "<input type=checkbox class=chk>" + a;
    }
    function alldel() {
        let divMain = document.querySelector('div')
        let divMainc = divMain.children

        for (let i = 0; i < divMainc.length; i++) {
            if (divMainc[i].children[0].checked) {
                divMain.removeChild(divMain.children[i])
                i--
            }
        }

    }

    //검색 버튼이 클릭하면 검색어를 추가하시오.

</script>
