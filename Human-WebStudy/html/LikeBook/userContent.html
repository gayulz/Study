<!DOCTYPE html>

<body>
    <div>

        </div>
        <div id="nav">

            </div>

                    <div class="mb-3" style="width: 100%;">
                        <label for="exampleFormControlTextarea1" class="form-label">추천하는 분야 및 책</label>
                        <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                    </div>
                    추천 사이트1

                    추천 사이트2
                    <input class="form-control" type="text" placeholder="추천사이트" aria-label="default input example">
                    추천 사이트3
                    <input class="form-control" type="text" placeholder="추천사이트" aria-label="default input example">
                    <br>
                    <button type="button" class="btn btn-warning" style="width: 100%;"> SAVE </button>
