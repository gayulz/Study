<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <article>
    <section>
      <div>
        <div>
          <div class="card text-center">
            <div class="card-body">
              <h1 class="card-title"> 등록된 문의글 </h1>
            </div>
          </div>
        </div>
      </div>
      <div id="article_table">
        <table class="table">
          <thead class="table-dark">
            <tr style="text-align: center">
              <th scope="col" width="10%" style="text-align: center">글번호</th>
              <th scope="col" width="20%" style="text-align: center">작성자</th>
              <th scope="col" width="40%" style="text-align: center">제목</th>
              <th scope="col" width="20%" style="text-align: center">등록일</th>
              <th scope="col" width="20%" style="text-align: center">수정 / 삭제</th>
            </tr>
          </thead>
          <tbody>
            <!-- 컨트롤러에서 보낸 리스트를 반복하여 tr단위로 출력하면 된다 -->
            <c:forEach items="${blist}" var="bbsvo">
              <tr>
                <th scope="row" style="text-align: center">글번호</th>
                <td style="text-align: center">작성자</td>
                <td style="text-align: center">제목</td>
                <td style="text-align: center">등록일</td>
                <td style="text-align: center">[수정][삭제]</td>
              </tr>
            </c:forEach>
          </tbody>
        </table>
        <div id="table_menu">
          <a href="bbswr"> 게시글 등록하기
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-file-plus"
              viewBox="0 0 16 16">
              <path d="M8.5 6a.5.5 0 0 0-1 0v1.5H6a.5.5 0 0 0 0 1h1.5V10a.5.5 0 0 0 1 0V8.5H10a.5.5 0 0 0 0-1H8.5V6z" />
              <path
                d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2zm10-1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1z" />
            </svg>
          </a>
        </div>

      </div>
      </div>
    </section>
  </article>
</body>

</html>
